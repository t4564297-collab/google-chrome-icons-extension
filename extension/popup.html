
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>مُصلح أيقونات جوجل</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      width: 280px;
      padding: 15px;
      text-align: center;
      background-color: #f9fafe;
      color: #333;
    }
    h3 {
      margin-top: 0;
      color: #1a73e8;
    }
    p {
      font-size: 13px;
      margin-bottom: 15px;
    }
    #currentSite {
      font-weight: bold;
      color: #5f6368;
      font-size: 12px;
      word-break: break-all;
      background-color: #e8eaf6;
      padding: 5px 8px;
      border-radius: 4px;
      margin-bottom: 15px;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
      margin-top: 5px;
    }
    button:hover {
      opacity: 0.9;
    }
    button:active {
      transform: scale(0.98);
    }
    .enabled {
      background-color: #d32f2f; /* Red for "Disable" */
    }
    .disabled {
      background-color: #34a853; /* Green for "Enable" */
    }
    .rescan {
      background-color: #1a73e8; /* Blue for neutral action */
    }
    .analyze {
      background-color: #f57c00; /* Orange for analysis */
      margin-top: 10px;
    }
    .divider {
      border-top: 1px solid #e0e0e0;
      margin: 15px 0;
    }
    .reload-notice {
        font-size: 12px;
        color: #666;
        margin-top: 15px;
    }
  </style>
</head>
<body>
  <h3>مُصلح أيقونات جوجل</h3>
  
  <p>التحكم في عمل الإضافة على الموقع الحالي:</p>
  <div id="currentSite">...</div>
  
  <button id="toggleButton"></button>
  <p class="reload-notice">قد تحتاج إلى تحديث الصفحة بعد التفعيل/التعطيل.</p>

  <div class="divider"></div>

  <p>أدوات إضافية:</p>
  <button id="rescanButton" class="rescan">إعادة فحص الأيقونات</button>
  <button id="analyzeButton" class="analyze">عرض الأيقونات المكتشفة</button>
  
  <script src="popup.js"></script>
</body>
</html>
