<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>مُصلح أيقونات جوجل</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      width: 250px;
      padding: 15px;
      text-align: center;
      background-color: #f9f9f9;
      color: #333;
    }
    h3 {
      margin-top: 0;
      color: #005fcc;
    }
    p {
      font-size: 13px;
      margin-bottom: 15px;
    }
    #currentSite {
      font-weight: bold;
      color: #555;
      font-size: 12px;
      word-break: break-all;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      opacity: 0.9;
    }
    .enabled {
      background-color: #d32f2f; /* Red for "Disable" */
    }
    .disabled {
      background-color: #388e3c; /* Green for "Enable" */
    }
    .reload-notice {
        font-size: 12px;
        color: #666;
        margin-top: 10px;
    }
  </style>
</head>
<body>
  <h3>مُصلح أيقونات جوجل</h3>
  <p>التحكم في عمل الإضافة على الموقع الحالي:</p>
  <p id="currentSite">...</p>
  
  <button id="toggleButton"></button>

  <p class="reload-notice">قد تحتاج إلى تحديث الصفحة لتطبيق التغييرات.</p>

  <script src="popup.js"></script>
</body>
</html>
